spring:
  session:
    store-type: redis
    redis:
      namespace: accountshop:session
  application:
    name: AccountShop

  # Database
  datasource:
    url: jdbc:mysql://localhost:3306/accountshop_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
    username: root
    password: 123456789
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms


  # Thymeleaf
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    encoding: UTF-8

  # Mail (optional — for password reset)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:vutranorhilsun@gmail.com}
    password: ${MAIL_PASSWORD:psyd kmim ofsv qpmc}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: accountshop-email-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  # File upload
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# App custom config

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Quản lý Users</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="page-content">
            <div class="page-header">
                <div>
                    <h1>Quản lý Users</h1>
                    <p th:text="${users.totalElements} + ' tài khoản trong hệ thống'">0 tài khoản</p>
                </div>
            </div>

            <div class="data-table-wrapper">
                <div class="table-header">
                    <div class="table-actions">
                        <h3>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                                <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                            </svg>
                            Danh sách Users
                        </h3>
                        <div class="filter-tabs">
                            <a th:href="@{/admin/users}" class="filter-tab"
                                th:classappend="${roleFilter == null} ? 'active'">Tất cả</a>
                            <a th:href="@{/admin/users(role=ROLE_USER)}" class="filter-tab"
                                th:classappend="${roleFilter == 'ROLE_USER'} ? 'active'">User</a>
                            <a th:href="@{/admin/users(role=ROLE_SELLER)}" class="filter-tab"
                                th:classappend="${roleFilter == 'ROLE_SELLER'} ? 'active'">Seller</a>
                            <a th:href="@{/admin/users(role=ROLE_ADMIN)}" class="filter-tab"
                                th:classappend="${roleFilter == 'ROLE_ADMIN'} ? 'active'">Admin</a>
                        </div>
                    </div>
                    <div class="search-box">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <form th:action="@{/admin/users}" method="get" style="display:contents">
                            <input type="text" name="search" placeholder="Tìm user..." th:value="${searchTerm}">
                        </form>
                    </div>
                </div>

                <div th:if="${users.hasContent()}">
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Username</th>
                                    <th>Email</th>
                                    <th>Họ tên</th>
                                    <th>Role</th>
                                    <th>Trạng thái</th>
                                    <th>Ngày tạo</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${users}" class="clickable-row">
                                    <td style="color:var(--text-muted)" th:text="'#' + ${u.id}">#1</td>
                                    <td style="font-weight:600" th:text="${u.username}">username</td>
                                    <td th:text="${u.email}">email</td>
                                    <td
                                        th:text="${u.firstName != null ? u.firstName + ' ' + (u.lastName ?: '') : u.username}">
                                        Name</td>
                                    <td>
                                        <th:block th:each="r : ${u.roles}">
                                            <span class="badge"
                                                th:classappend="${r.contains('ADMIN')} ? 'role-admin' : (${r.contains('SELLER')} ? 'role-seller' : 'role-user')"
                                                th:text="${r}">ROLE</span>
                                        </th:block>
                                    </td>
                                    <td>
                                        <span class="badge" th:classappend="${u.enabled} ? 'active' : 'disabled'"
                                            th:text="${u.enabled} ? 'Active' : 'Banned'">Active</span>
                                    </td>
                                    <td style="font-size:13px;color:var(--text-muted)"
                                        th:text="${#temporals.format(u.createdAt, 'dd/MM/yyyy')}">01/01/2026</td>
                                    <td>
                                        <div style="display:flex;gap:6px">
                                            <button class="btn-sm btn-primary" th:data-id="${u.id}"
                                                onclick="openUserModal(this.dataset.id)">Chi tiết</button>
                                            <button class="btn-sm"
                                                th:classappend="${u.enabled} ? 'btn-danger' : 'btn-success'"
                                                th:data-id="${u.id}" th:text="${u.enabled} ? 'Ban' : 'Unban'"
                                                onclick="toggleBan(this.dataset.id)">Ban</button>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" th:if="${users.totalPages > 1}">
                        <div class="pagination-info"
                            th:text="'Trang ' + ${users.number + 1} + ' / ' + ${users.totalPages}">Trang 1</div>
                        <div class="pagination-buttons">
                            <a th:href="@{/admin/users(page=${users.number - 1}, role=${roleFilter}, search=${searchTerm})}"
                                class="pagination-btn" th:classappend="${users.number == 0} ? 'disabled'">‹</a>
                            <th:block th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}">
                                <a th:href="@{/admin/users(page=${i}, role=${roleFilter}, search=${searchTerm})}"
                                    class="pagination-btn" th:classappend="${i == users.number} ? 'active'"
                                    th:text="${i + 1}">1</a>
                            </th:block>
                            <a th:href="@{/admin/users(page=${users.number + 1}, role=${roleFilter}, search=${searchTerm})}"
                                class="pagination-btn"
                                th:classappend="${users.number >= users.totalPages - 1} ? 'disabled'">›</a>
                        </div>
                    </div>
                </div>

                <div th:unless="${users.hasContent()}" class="empty-state">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                        <circle cx="9" cy="7" r="4" />
                    </svg>
                    <h3>Không tìm thấy user</h3>
                    <p>Thử thay đổi bộ lọc hoặc từ tìm kiếm</p>
                </div>
            </div>
        </div>

        <!-- ══════ USER DETAIL MODAL ══════ -->
        <div id="userModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
            <div class="modal-card">
                <div class="modal-header">
                    <h2>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        Chi tiết User
                    </h2>
                    <button class="modal-close" onclick="closeModal()">✕</button>
                </div>
                <div class="modal-body" id="modalBody">
                    <div class="modal-loading">Đang tải...</div>
                </div>
            </div>
        </div>

        <style>
            /* Action Buttons */
            .btn-sm {
                padding: 5px 14px;
                border-radius: 8px;
                border: 1px solid var(--border-color);
                background: var(--bg-darker, rgba(0, 0, 0, .15));
                color: var(--text-color);
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                transition: all .2s;
                white-space: nowrap
            }

            .btn-sm:hover {
                transform: translateY(-1px);
                box-shadow: 0 2px 8px rgba(0, 0, 0, .15)
            }

            .btn-primary {
                background: linear-gradient(135deg, var(--primary), var(--primary-dark, #4f46e5));
                color: #fff;
                border: none
            }

            .btn-danger {
                background: color-mix(in srgb, #ef4444 15%, transparent);
                color: #ef4444;
                border-color: color-mix(in srgb, #ef4444 25%, transparent)
            }

            .btn-success {
                background: color-mix(in srgb, #10b981 15%, transparent);
                color: #10b981;
                border-color: color-mix(in srgb, #10b981 25%, transparent)
            }

            .badge.disabled {
                background: color-mix(in srgb, #ef4444 12%, transparent);
                color: #ef4444
            }

            /* Modal */
            .modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 1000;
                background: rgba(0, 0, 0, .65);
                backdrop-filter: blur(6px);
                display: flex;
                align-items: center;
                justify-content: center;
                animation: fadeIn .2s
            }

            .modal-card {
                background: var(--card-bg, #1a1a2e);
                border: 1px solid var(--border-color);
                border-radius: 20px;
                width: 560px;
                max-width: 92vw;
                max-height: 88vh;
                overflow-y: auto;
                animation: slideUp .3s ease
            }

            .modal-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 24px 28px 16px;
                border-bottom: 1px solid var(--border-color)
            }

            .modal-header h2 {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 1.15rem;
                font-weight: 700;
                color: var(--text-color);
                margin: 0
            }

            .modal-close {
                background: none;
                border: none;
                color: var(--text-muted);
                font-size: 1.2rem;
                cursor: pointer;
                padding: 4px 10px;
                border-radius: 8px;
                transition: all .2s
            }

            .modal-close:hover {
                background: rgba(255, 255, 255, .08);
                color: var(--text-color)
            }

            .modal-body {
                padding: 24px 28px 28px
            }

            .modal-loading {
                text-align: center;
                padding: 48px 0;
                color: var(--text-muted);
                font-size: .9rem
            }

            /* Modal content */
            .user-profile-row {
                display: flex;
                align-items: center;
                gap: 16px;
                margin-bottom: 24px
            }

            .user-avatar {
                width: 56px;
                height: 56px;
                border-radius: 50%;
                background: linear-gradient(135deg, var(--primary), #10b981);
                display: flex;
                align-items: center;
                justify-content: center;
                color: #fff;
                font-size: 1.3rem;
                font-weight: 700;
                flex-shrink: 0;
                overflow: hidden
            }

            .user-avatar img {
                width: 100%;
                height: 100%;
                object-fit: cover
            }

            .user-profile-info h3 {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--text-color);
                margin: 0 0 2px
            }

            .user-profile-info p {
                font-size: .85rem;
                color: var(--text-muted);
                margin: 0
            }

            .user-profile-badges {
                display: flex;
                gap: 6px;
                margin-top: 8px;
                flex-wrap: wrap
            }

            .user-stats {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
                margin-bottom: 24px
            }

            .stat-card {
                background: var(--bg-darker, rgba(0, 0, 0, .15));
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 14px;
                text-align: center
            }

            .stat-value {
                font-size: 1.2rem;
                font-weight: 700;
                color: var(--text-color)
            }

            .stat-label {
                font-size: .72rem;
                color: var(--text-muted);
                margin-top: 2px
            }

            .user-info-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                margin-bottom: 24px
            }

            .user-info-item {
                background: var(--bg-darker, rgba(0, 0, 0, .15));
                border-radius: 10px;
                padding: 12px 14px
            }

            .user-info-item .label {
                font-size: .72rem;
                color: var(--text-muted);
                font-weight: 500;
                margin-bottom: 4px
            }

            .user-info-item .value {
                font-size: .85rem;
                color: var(--text-color);
                font-weight: 500
            }

            .role-section {
                margin-bottom: 20px
            }

            .role-section h4 {
                font-size: .9rem;
                font-weight: 600;
                color: var(--text-color);
                margin: 0 0 12px;
                display: flex;
                align-items: center;
                gap: 8px
            }

            .role-checkboxes {
                display: flex;
                gap: 10px;
                flex-wrap: wrap
            }

            .role-checkbox {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 16px;
                border: 1px solid var(--border-color);
                border-radius: 10px;
                cursor: pointer;
                transition: all .2s;
                font-size: .85rem;
                color: var(--text-color);
                background: var(--bg-darker, rgba(0, 0, 0, .15))
            }

            .role-checkbox:hover {
                border-color: var(--primary)
            }

            .role-checkbox input {
                accent-color: var(--primary)
            }

            .role-checkbox.checked {
                border-color: var(--primary);
                background: color-mix(in srgb, var(--primary) 10%, transparent)
            }

            .modal-actions {
                display: flex;
                gap: 10px;
                padding-top: 16px;
                border-top: 1px solid var(--border-color)
            }

            .modal-btn {
                flex: 1;
                padding: 12px;
                border-radius: 12px;
                border: none;
                font-weight: 600;
                font-size: .9rem;
                cursor: pointer;
                transition: all .2s;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 8px
            }

            .modal-btn:hover {
                transform: translateY(-1px)
            }

            .modal-btn-save {
                background: linear-gradient(135deg, var(--primary), var(--primary-dark, #4f46e5));
                color: #fff
            }

            .modal-btn-ban {
                background: color-mix(in srgb, #ef4444 12%, transparent);
                color: #ef4444;
                border: 1px solid color-mix(in srgb, #ef4444 25%, transparent)
            }

            .modal-btn-unban {
                background: color-mix(in srgb, #10b981 12%, transparent);
                color: #10b981;
                border: 1px solid color-mix(in srgb, #10b981 25%, transparent)
            }

            @keyframes fadeIn {
                from {
                    opacity: 0
                }

                to {
                    opacity: 1
                }
            }

            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(20px)
                }

                to {
                    opacity: 1;
                    transform: translateY(0)
                }
            }
        </style>

        <script th:inline="javascript">
            const csrfToken = document.querySelector('meta[name="_csrf"]')?.content;
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.content;

            let currentUserId = null;

            function openUserModal(id) {
                currentUserId = id;
                document.getElementById('userModal').style.display = 'flex';
                document.getElementById('modalBody').innerHTML = '<div class="modal-loading">Đang tải...</div>';

                fetch('/admin/api/users/' + id, {
                    headers: { [csrfHeader]: csrfToken }
                })
                    .then(r => r.json())
                    .then(u => renderModal(u))
                    .catch(() => {
                        document.getElementById('modalBody').innerHTML = '<div class="modal-loading">Lỗi tải dữ liệu</div>';
                    });
            }

            function closeModal() {
                document.getElementById('userModal').style.display = 'none';
            }

            function renderModal(u) {
                const roles = Array.isArray(u.roles) ? u.roles : (u.roles ? Object.values(u.roles) : []);
                const name = (u.firstName || '') + ' ' + (u.lastName || '') || u.username;
                const initial = (u.firstName || u.username || '?')[0].toUpperCase();
                const avatarHtml = u.avatar
                    ? `<img src="${u.avatar}" alt="avatar">`
                    : initial;

                const roleBadges = roles.map(r => {
                    const cls = r.includes('ADMIN') ? 'role-admin' : (r.includes('SELLER') ? 'role-seller' : 'role-user');
                    return `<span class="badge ${cls}">${r}</span>`;
                }).join('');

                const statusBadge = u.enabled
                    ? '<span class="badge active">Active</span>'
                    : '<span class="badge disabled">Banned</span>';

                const emailVerified = u.emailVerified
                    ? '<span style="color:#10b981">✓ Đã xác minh</span>'
                    : '<span style="color:#f59e0b">✗ Chưa xác minh</span>';

                const createdAt = u.createdAt ? new Date(u.createdAt).toLocaleDateString('vi-VN') : '—';
                const lastLogin = u.lastLoginAt ? new Date(u.lastLoginAt).toLocaleDateString('vi-VN', { hour: '2-digit', minute: '2-digit' }) : 'Chưa đăng nhập';

                const allRoleKeys = ['USER', 'SELLER', 'ADMIN'];
                // Auto-detect: does DB use "ROLE_USER" or just "USER"?
                const hasPrefix = roles.some(r => r.startsWith('ROLE_'));
                const normalize = (key) => hasPrefix ? 'ROLE_' + key : key;
                const displayName = (key) => key; // Show: USER, SELLER, ADMIN

                const roleCheckboxes = allRoleKeys.map(key => {
                    const val = normalize(key);
                    const checked = roles.includes(val) ? 'checked' : '';
                    const checkedClass = roles.includes(val) ? 'checked' : '';
                    return `<label class="role-checkbox ${checkedClass}"><input type="checkbox" value="${val}" ${checked} onchange="this.parentElement.classList.toggle('checked',this.checked)"> ${displayName(key)}</label>`;
                }).join('');

                const banBtnClass = u.enabled ? 'modal-btn-ban' : 'modal-btn-unban';
                const banBtnText = u.enabled ? '🚫 Ban User' : '✅ Unban User';

                document.getElementById('modalBody').innerHTML = `
                    <div class="user-profile-row">
                        <div class="user-avatar">${avatarHtml}</div>
                        <div class="user-profile-info">
                            <h3>${name}</h3>
                            <p>@${u.username} · ${u.email}</p>
                            <div class="user-profile-badges">${roleBadges} ${statusBadge}</div>
                        </div>
                    </div>
                    <div class="user-stats">
                        <div class="stat-card"><div class="stat-value">${u.orderCount || 0}</div><div class="stat-label">Đơn hàng</div></div>
                        <div class="stat-card"><div class="stat-value">${createdAt}</div><div class="stat-label">Ngày tạo</div></div>
                        <div class="stat-card"><div class="stat-value" style="font-size:.85rem">${lastLogin}</div><div class="stat-label">Đăng nhập cuối</div></div>
                    </div>
                    <div class="user-info-grid">
                        <div class="user-info-item"><div class="label">SĐT</div><div class="value">${u.phone || '—'}</div></div>
                        <div class="user-info-item"><div class="label">Email</div><div class="value">${emailVerified}</div></div>
                    </div>
                    <div class="role-section">
                        <h4>🛡️ Phân quyền</h4>
                        <div class="role-checkboxes" id="roleCheckboxes">${roleCheckboxes}</div>
                    </div>
                    <div class="modal-actions">
                        <button class="modal-btn modal-btn-save" onclick="saveRoles()">💾 Lưu quyền</button>
                        <button class="modal-btn ${banBtnClass}" onclick="toggleBanModal()">${banBtnText}</button>
                    </div>
                `;
            }

            async function saveRoles() {
                const checks = document.querySelectorAll('#roleCheckboxes input:checked');
                const roles = Array.from(checks).map(c => c.value);
                if (roles.length === 0) { showAlert('Phải chọn ít nhất 1 role', 'warning'); return; }

                fetch('/admin/users/' + currentUserId + '/update-role', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', [csrfHeader]: csrfToken },
                    body: JSON.stringify({ roles })
                })
                    .then(r => r.json())
                    .then(() => { showToast('Đã cập nhật quyền', 'success'); setTimeout(() => location.reload(), 800); })
                    .catch(() => showToast('Lỗi cập nhật', 'error'));
            }

            async function toggleBan(id) {
                const confirmed = await showConfirm('Bạn chắc chắn muốn ban/unban user này?', {
                    title: 'Thay đổi trạng thái', type: 'warning', danger: true, confirmText: 'Xác nhận'
                });
                if (!confirmed) return;
                fetch('/admin/users/' + id + '/toggle-ban', {
                    method: 'POST',
                    headers: { [csrfHeader]: csrfToken }
                })
                    .then(r => r.json())
                    .then(() => location.reload())
                    .catch(() => showToast('Lỗi', 'error'));
            }

            async function toggleBanModal() {
                const confirmed = await showConfirm('Bạn chắc chắn muốn thay đổi trạng thái user này?', {
                    title: 'Thay đổi trạng thái', type: 'warning', danger: true, confirmText: 'Xác nhận'
                });
                if (!confirmed) return;
                fetch('/admin/users/' + currentUserId + '/toggle-ban', {
                    method: 'POST',
                    headers: { [csrfHeader]: csrfToken }
                })
                    .then(r => r.json())
                    .then(() => { closeModal(); location.reload(); })
                    .catch(() => showToast('Lỗi', 'error'));
            }

            document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
        </script>
    </div>
</body>

</html>

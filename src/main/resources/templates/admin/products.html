<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{admin/layout}">

<head>
    <title>Quản lý Products</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="page-content">
            <div class="page-header">
                <div>
                    <h1>Quản lý sản phẩm</h1>
                    <p th:text="${products.totalElements} + ' sản phẩm'">0 sản phẩm</p>
                </div>
                <a th:href="@{/admin/products/new}" class="btn-primary"
                    style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-radius:10px;font-weight:600;font-size:0.9rem;text-decoration:none;transition:all 0.2s">
                    + Thêm sản phẩm
                </a>
            </div>

            <!-- Success alert -->
            <div th:if="${success}"
                style="padding:12px 18px;border-radius:10px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);color:#10b981;font-size:0.9rem;margin-bottom:20px"
                th:text="${success}">
                Success
            </div>

            <div class="data-table-wrapper">
                <div class="table-header">
                    <div class="table-actions">
                        <h3>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="16.5" y1="9.4" x2="7.5" y2="4.21" />
                                <path
                                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                                <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                                <line x1="12" y1="22.08" x2="12" y2="12" />
                            </svg>
                            Danh sách sản phẩm
                        </h3>
                        <div class="filter-tabs">
                            <a th:href="@{/admin/products}" class="filter-tab"
                                th:classappend="${statusFilter == null} ? 'active'">Tất cả</a>
                            <a th:href="@{/admin/products(status=ACTIVE)}" class="filter-tab"
                                th:classappend="${statusFilter == 'ACTIVE'} ? 'active'">Đang bán</a>
                            <a th:href="@{/admin/products(status=INACTIVE)}" class="filter-tab"
                                th:classappend="${statusFilter == 'INACTIVE'} ? 'active'">Tạm ẩn</a>
                        </div>
                    </div>
                    <div class="search-box">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <form th:action="@{/admin/products}" method="get" style="display:contents">
                            <input type="text" name="search" placeholder="Tìm sản phẩm..." th:value="${searchTerm}">
                        </form>
                    </div>
                </div>

                <div th:if="${products.hasContent()}">
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Sản phẩm</th>
                                    <th>Danh mục</th>
                                    <th>Giá</th>
                                    <th>Đã bán</th>
                                    <th>Trạng thái</th>
                                    <th>Ngày tạo</th>
                                    <th style="text-align:right">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${products}">
                                    <td style="color:var(--text-muted)" th:text="'#' + ${p.id}">#1</td>
                                    <td>
                                        <div style="display:flex;align-items:center;gap:12px">
                                            <div
                                                style="width:40px;height:40px;border-radius:8px;overflow:hidden;background:var(--bg-card-hover);flex-shrink:0;display:flex;align-items:center;justify-content:center">
                                                <img th:if="${p.images != null && !p.images.isEmpty()}"
                                                    th:src="${p.images[0].imageUrl}" th:alt="${p.name}"
                                                    style="width:100%;height:100%;object-fit:cover">
                                                <svg th:unless="${p.images != null && !p.images.isEmpty()}" width="18"
                                                    height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                                    stroke-width="1.5" style="color:var(--text-muted)">
                                                    <line x1="16.5" y1="9.4" x2="7.5" y2="4.21" />
                                                    <path
                                                        d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                                                </svg>
                                            </div>
                                            <div>
                                                <div style="font-weight:600" th:text="${p.name}">Product</div>
                                                <div style="font-size:11px;color:var(--text-muted)"
                                                    th:text="'/' + ${p.slug}">slug</div>
                                            </div>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="badge processing" th:if="${p.category != null}"
                                            th:text="${p.category.name}">Category</span>
                                        <span class="badge suspended" th:unless="${p.category != null}">—</span>
                                    </td>
                                    <td style="font-weight:500"
                                        th:text="${p.minPrice != null ? #numbers.formatDecimal(p.minPrice, 0, 'COMMA', 0, 'POINT') + '₫' : '—'}">
                                        0₫</td>
                                    <td th:text="${p.totalSold != null ? p.totalSold : 0}">0</td>
                                    <td>
                                        <span class="badge" th:classappend="${p.active} ? 'active' : 'disabled'"
                                            th:text="${p.active} ? 'Đang bán' : 'Tạm ẩn'">Active</span>
                                    </td>
                                    <td style="font-size:13px;color:var(--text-muted)"
                                        th:text="${#temporals.format(p.createdAt, 'dd/MM/yyyy')}">01/01/2026</td>
                                    <td style="text-align:right">
                                        <div style="display:flex;gap:6px;justify-content:flex-end">
                                            <a th:href="@{/admin/products/{id}/accounts(id=${p.id})}"
                                                style="padding:5px 12px;border-radius:8px;font-size:12px;background:rgba(16,185,129,0.1);color:#34d399;border:1px solid rgba(16,185,129,0.2);text-decoration:none;cursor:pointer"
                                                title="Quản lý tài khoản">
                                                📦 TK
                                            </a>
                                            <a th:href="@{/admin/products/{id}/edit(id=${p.id})}"
                                                style="padding:5px 12px;border-radius:8px;font-size:12px;background:rgba(99,102,241,0.1);color:#818cf8;border:1px solid rgba(99,102,241,0.2);text-decoration:none;cursor:pointer">
                                                Sửa
                                            </a>
                                            <form th:action="@{/admin/products/{id}/toggle(id=${p.id})}" method="post"
                                                style="margin:0">
                                                <button type="submit"
                                                    style="padding:5px 12px;border-radius:8px;font-size:12px;background:rgba(245,158,11,0.1);color:#fbbf24;border:1px solid rgba(245,158,11,0.2);cursor:pointer"
                                                    th:text="${p.active ? 'Ẩn' : 'Hiện'}">Toggle</button>
                                            </form>
                                            <form th:action="@{/admin/products/{id}/delete(id=${p.id})}" method="post"
                                                style="margin:0" id="deleteProduct" onsubmit="return false">
                                                <button type="button"
                                                    onclick="(async()=>{if(await showConfirm('Xóa sản phẩm này?',{title:'Xóa sản phẩm',type:'danger',danger:true,confirmText:'Xóa'}))this.closest('form').removeAttribute('onsubmit'),this.closest('form').submit()})()"
                                                    style="padding:5px 12px;border-radius:8px;font-size:12px;background:rgba(239,68,68,0.1);color:#f87171;border:1px solid rgba(239,68,68,0.2);cursor:pointer">
                                                    Xóa
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="pagination" th:if="${products.totalPages > 1}">
                        <div class="pagination-info"
                            th:text="'Trang ' + ${products.number + 1} + ' / ' + ${products.totalPages} + ' (' + ${products.totalElements} + ' sản phẩm)'">
                            Trang 1</div>
                        <div class="pagination-buttons">
                            <a th:href="@{/admin/products(page=${products.number - 1}, status=${statusFilter}, search=${searchTerm})}"
                                class="pagination-btn" th:classappend="${products.number == 0} ? 'disabled'">‹</a>
                            <th:block th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}">
                                <a th:href="@{/admin/products(page=${i}, status=${statusFilter}, search=${searchTerm})}"
                                    class="pagination-btn" th:classappend="${i == products.number} ? 'active'"
                                    th:text="${i + 1}">1</a>
                            </th:block>
                            <a th:href="@{/admin/products(page=${products.number + 1}, status=${statusFilter}, search=${searchTerm})}"
                                class="pagination-btn"
                                th:classappend="${products.number >= products.totalPages - 1} ? 'disabled'">›</a>
                        </div>
                    </div>
                </div>

                <div th:unless="${products.hasContent()}" class="empty-state">
                    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.5">
                        <line x1="16.5" y1="9.4" x2="7.5" y2="4.21" />
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                    </svg>
                    <h3>Không tìm thấy sản phẩm</h3>
                    <p>Thử thay đổi bộ lọc hoặc từ tìm kiếm</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

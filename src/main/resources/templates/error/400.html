<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Yêu cầu không hợp lệ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f14;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .error-container {
            text-align: center;
            padding: 40px 20px;
        }

        .error-code {
            font-size: 96px;
            font-weight: 800;
            background: linear-gradient(135deg, #e67e22, #d35400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
        }

        .error-title {
            font-size: 24px;
            color: #ccc;
            margin: 16px 0 8px;
        }

        .error-desc {
            color: #888;
            margin-bottom: 32px;
        }

        .error-btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .error-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="error-container">
        <div class="error-code">400</div>
        <h2 class="error-title">Yêu cầu không hợp lệ</h2>
        <p class="error-desc">Dữ liệu bạn gửi không hợp lệ. Vui lòng kiểm tra lại.</p>
        <a th:href="@{/}" href="/" class="error-btn">Về trang chủ</a>
    </div>
</body>

</html>

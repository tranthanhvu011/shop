<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/default}">

<head>
    <title>Quên mật khẩu</title>
    <th:block layout:fragment="styles">
        <style>
            .loginPage {
                min-height: calc(100vh - 200px);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: var(--spacing-xl);
            }

            .loginContainer {
                width: 100%;
                max-width: 450px;
            }

            .loginContent {
                padding: var(--spacing-xl);
            }

            .loginHeader {
                text-align: center;
                margin-bottom: var(--spacing-2xl);
            }

            .loginHeader h1 {
                font-size: 2rem;
                margin-bottom: var(--spacing-sm);
            }

            .loginHeader p {
                color: var(--gray-600);
                margin-bottom: 0;
            }

            .loginError {
                background-color: rgba(239, 68, 68, 0.1);
                color: var(--danger);
                padding: var(--spacing-md);
                border-radius: var(--radius-md);
                margin-bottom: var(--spacing-md);
                text-align: center;
            }

            .loginSuccess {
                background-color: rgba(16, 185, 129, 0.1);
                color: var(--success);
                padding: var(--spacing-md);
                border-radius: var(--radius-md);
                margin-bottom: var(--spacing-md);
                text-align: center;
            }

            .formGroup {
                margin-bottom: var(--spacing-md);
            }

            .formLabel {
                display: block;
                font-size: 0.875rem;
                font-weight: 500;
                margin-bottom: 6px;
                color: var(--text-muted);
            }

            .formInput {
                width: 100%;
                padding: 11px 16px;
                border: 1px solid var(--border-color);
                border-radius: 12px;
                font-size: 0.9rem;
                background: var(--bg-color);
                color: var(--text-color);
                transition: border-color 0.2s, box-shadow 0.2s;
            }

            .formInput:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
            }

            .btnPrimary {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 12px;
                background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                color: #fff;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.25s;
            }

            .btnPrimary:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
            }

            .loginFooter {
                text-align: center;
                margin-top: var(--spacing-xl);
            }

            .loginFooter a {
                color: var(--primary);
                font-weight: 500;
            }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="loginPage">
            <div class="loginContainer">
                <div class="card">
                    <div class="loginContent">
                        <div class="loginHeader">
                            <h1>Quên mật khẩu</h1>
                            <p>Nhập email để nhận link đặt lại mật khẩu</p>
                        </div>
                        <div th:if="${error}" class="loginError" th:text="${error}"></div>
                        <div th:if="${success}" class="loginSuccess" th:text="${success}"></div>
                        <form th:action="@{/forgot-password}" method="post">
                            <div class="formGroup">
                                <label class="formLabel" for="email">Email</label>
                                <input type="email" id="email" name="email" class="formInput"
                                    placeholder="Nhập email của bạn" required autofocus>
                            </div>
                            <button type="submit" class="btnPrimary">Gửi link đặt lại</button>
                        </form>
                        <div class="loginFooter">
                            <p><a th:href="@{/login}">← Quay lại đăng nhập</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/default}">

<head>
    <title>Đăng nhập</title>
    <th:block layout:fragment="styles">
        <style>
            .loginPage {
                min-height: calc(100vh - 200px);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: var(--spacing-xl);
            }

            .loginContainer {
                width: 100%;
                max-width: 450px;
            }

            .loginContent {
                padding: var(--spacing-xl);
            }

            .loginHeader {
                text-align: center;
                margin-bottom: var(--spacing-2xl);
            }

            .loginHeader h1 {
                font-size: 2rem;
                margin-bottom: var(--spacing-sm);
            }

            .loginHeader p {
                color: var(--gray-600);
                margin-bottom: 0;
            }

            .loginError {
                background-color: rgba(239, 68, 68, 0.1);
                color: var(--danger);
                padding: var(--spacing-md);
                border-radius: var(--radius-md);
                margin-bottom: var(--spacing-md);
                text-align: center;
            }

            .loginSuccess {
                background-color: rgba(16, 185, 129, 0.1);
                color: var(--success);
                padding: var(--spacing-md);
                border-radius: var(--radius-md);
                margin-bottom: var(--spacing-md);
                text-align: center;
            }

            .formGroup {
                margin-bottom: var(--spacing-md);
            }

            .formLabel {
                display: block;
                font-size: 0.875rem;
                font-weight: 500;
                margin-bottom: 6px;
                color: var(--text-muted);
            }

            .formInput {
                width: 100%;
                padding: 11px 16px;
                border: 1px solid var(--border-color);
                border-radius: 12px;
                font-size: 0.9rem;
                background: var(--bg-color);
                color: var(--text-color);
                transition: border-color 0.2s, box-shadow 0.2s;
            }

            .formInput:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
            }

            .rememberRow {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: var(--spacing-lg);
                font-size: 0.875rem;
            }

            .rememberLabel {
                display: flex;
                align-items: center;
                gap: 6px;
                color: var(--text-muted);
                cursor: pointer;
            }

            .btnPrimary {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 12px;
                background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                color: #fff;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.25s;
            }

            .btnPrimary:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
            }

            .loginFooter {
                text-align: center;
                margin-top: var(--spacing-xl);
            }

            .loginFooter p {
                color: var(--gray-600);
                margin: 0;
            }

            .loginFooter a {
                color: var(--primary);
                font-weight: 500;
            }

            .loginFooter a:hover {
                text-decoration: underline;
            }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="loginPage">
            <div class="loginContainer">
                <div class="card">
                    <div class="loginContent">
                        <div class="loginHeader">
                            <h1>Chào mừng trở lại</h1>
                            <p>Đăng nhập vào tài khoản của bạn</p>
                        </div>

                        <div th:if="${param.error}" class="loginError">Email hoặc mật khẩu không đúng</div>
                        <div th:if="${param.logout}" class="loginSuccess">Bạn đã đăng xuất thành công</div>
                        <div th:if="${success}" class="loginSuccess" th:text="${success}"></div>

                        <form th:action="@{/login}" method="post">
                            <div class="formGroup">
                                <label class="formLabel" for="taikhoan">Tài Khoản</label>
                                <input type="text" id="taikhoan" name="taikhoan" class="formInput"
                                    placeholder="Nhập tài khoản của bạn" required autofocus>
                            </div>
                            <div class="formGroup">
                                <label class="formLabel" for="matkhau">Mật khẩu</label>
                                <input type="password" id="matkhau" name="matkhau" class="formInput"
                                    placeholder="Nhập mật khẩu" required>
                            </div>
                            <div class="rememberRow">
                                <label class="rememberLabel">
                                    <input type="checkbox" name="remember-me"> Ghi nhớ đăng nhập
                                </label>
                                <a th:href="@{/forgot-password}">Quên mật khẩu?</a>
                            </div>
                            <button type="submit" class="btnPrimary">Đăng nhập</button>
                        </form>
                        <div class="loginFooter">
                            <p>Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout/default}">

<head>
    <title>Đặt lại mật khẩu</title>
    <th:block layout:fragment="styles">
        <style>
            .loginPage {
                min-height: calc(100vh - 200px);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: var(--spacing-xl);
            }

            .loginContainer {
                width: 100%;
                max-width: 450px;
            }

            .loginContent {
                padding: var(--spacing-xl);
            }

            .loginHeader {
                text-align: center;
                margin-bottom: var(--spacing-2xl);
            }

            .loginHeader h1 {
                font-size: 2rem;
                margin-bottom: var(--spacing-sm);
            }

            .loginHeader p {
                color: var(--gray-600);
                margin-bottom: 0;
            }

            .loginError {
                background-color: rgba(239, 68, 68, 0.1);
                color: var(--danger);
                padding: var(--spacing-md);
                border-radius: var(--radius-md);
                margin-bottom: var(--spacing-md);
                text-align: center;
            }

            .loginSuccess {
                background-color: rgba(16, 185, 129, 0.1);
                color: var(--success);
                padding: var(--spacing-md);
                border-radius: var(--radius-md);
                margin-bottom: var(--spacing-md);
                text-align: center;
            }

            .formGroup {
                margin-bottom: var(--spacing-md);
            }

            .formLabel {
                display: block;
                font-size: 0.875rem;
                font-weight: 500;
                margin-bottom: 6px;
                color: var(--text-muted);
            }

            .formInput {
                width: 100%;
                padding: 11px 16px;
                border: 1px solid var(--border-color);
                border-radius: 12px;
                font-size: 0.9rem;
                background: var(--bg-color);
                color: var(--text-color);
                transition: border-color 0.2s, box-shadow 0.2s;
            }

            .formInput:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.12);
            }

            .btnPrimary {
                width: 100%;
                padding: 12px;
                border: none;
                border-radius: 12px;
                background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                color: #fff;
                font-size: 0.95rem;
                font-weight: 600;
                cursor: pointer;
                transition: all 0.25s;
            }

            .btnPrimary:hover {
                transform: translateY(-1px);
                box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
            }

            .loginFooter {
                text-align: center;
                margin-top: var(--spacing-xl);
            }

            .loginFooter a {
                color: var(--primary);
                font-weight: 500;
            }

            .passwordHint {
                font-size: 0.8rem;
                color: var(--text-muted);
                margin-top: 4px;
            }

            .lockIcon {
                width: 64px;
                height: 64px;
                margin: 0 auto var(--spacing-md);
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, var(--primary), var(--primary-dark));
                border-radius: 50%;
                color: white;
            }
        </style>
    </th:block>
</head>

<body>
    <div layout:fragment="content">
        <div class="loginPage">
            <div class="loginContainer">
                <div class="card">
                    <div class="loginContent">
                        <div class="loginHeader">
                            <div class="lockIcon">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg>
                            </div>
                            <h1>Đặt lại mật khẩu</h1>
                            <p>Nhập mật khẩu mới cho tài khoản của bạn</p>
                        </div>
                        <div th:if="${error}" class="loginError" th:text="${error}"></div>
                        <div th:if="${success}" class="loginSuccess" th:text="${success}"></div>
                        <form th:action="@{/reset-password}" method="post">
                            <input type="hidden" name="token" th:value="${token}">
                            <div class="formGroup">
                                <label class="formLabel" for="password">Mật khẩu mới</label>
                                <input type="password" id="password" name="password" class="formInput"
                                    placeholder="Nhập mật khẩu mới" required autofocus minlength="6">
                                <p class="passwordHint">Tối thiểu 6 ký tự</p>
                            </div>
                            <div class="formGroup">
                                <label class="formLabel" for="confirmPassword">Xác nhận mật khẩu</label>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="formInput"
                                    placeholder="Nhập lại mật khẩu mới" required minlength="6">
                            </div>
                            <button type="submit" class="btnPrimary">Đặt lại mật khẩu</button>
                        </form>
                        <div class="loginFooter">
                            <p><a th:href="@{/login}">← Quay lại đăng nhập</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Admin Panel">Admin Panel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/variables.css}">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <th:block layout:fragment="styles"></th:block>
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                    </svg>
                </div>
                <span class="logo-text">Admin Panel</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section-title">Tổng quan</div>
                <a th:href="@{/admin/dashboard}" class="nav-item"
                    th:classappend="${requestURI == '/admin/dashboard'} ? 'active'">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.75">
                            <rect x="3" y="3" width="7" height="7" />
                            <rect x="14" y="3" width="7" height="7" />
                            <rect x="14" y="14" width="7" height="7" />
                            <rect x="3" y="14" width="7" height="7" />
                        </svg></span>
                    <span class="nav-label">Dashboard</span>
                </a>

                <div class="nav-section-title">Quản lý</div>
                <a th:href="@{/admin/users}" class="nav-item"
                    th:classappend="${requestURI.startsWith('/admin/users')} ? 'active'">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.75">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                            <circle cx="9" cy="7" r="4" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                        </svg></span>
                    <span class="nav-label">Users</span>
                </a>
                <a th:href="@{/admin/products}" class="nav-item"
                    th:classappend="${requestURI.startsWith('/admin/products')} ? 'active'">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.75">
                            <line x1="16.5" y1="9.4" x2="7.5" y2="4.21" />
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z" />
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96" />
                            <line x1="12" y1="22.08" x2="12" y2="12" />
                        </svg></span>
                    <span class="nav-label">Products</span>
                </a>
                <a th:href="@{/admin/orders}" class="nav-item"
                    th:classappend="${requestURI.startsWith('/admin/orders')} ? 'active'">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.75">
                            <circle cx="9" cy="21" r="1" />
                            <circle cx="20" cy="21" r="1" />
                            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
                        </svg></span>
                    <span class="nav-label">Orders</span>
                </a>
                <a th:href="@{/admin/messages}" class="nav-item"
                    th:classappend="${requestURI.startsWith('/admin/messages')} ? 'active'">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.75">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg></span>
                    <span class="nav-label">Tin nhắn</span>
                </a>

                <div class="nav-section-title">Hệ thống</div>
                <a th:href="@{/admin/settings}" class="nav-item"
                    th:classappend="${requestURI == '/admin/settings'} ? 'active'">
                    <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="1.75">
                            <circle cx="12" cy="12" r="3" />
                            <path
                                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
                        </svg></span>
                    <span class="nav-label">Settings</span>
                </a>
            </nav>

            <!-- Logout -->
            <div class="sidebar-footer">
                <form th:action="@{/logout}" method="post" style="margin:0">
                    <button type="submit" class="nav-item"
                        style="width:100%;border:none;background:none;cursor:pointer;text-align:left">
                        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="1.75">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                                <polyline points="16 17 21 12 16 7" />
                                <line x1="21" y1="12" x2="9" y2="12" />
                            </svg></span>
                        <span class="nav-label">Đăng xuất</span>
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main -->
        <div class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="mobile-toggle" id="mobileToggle"
                        onclick="document.getElementById('sidebar').classList.toggle('mobile-open')">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <line x1="3" y1="12" x2="21" y2="12" />
                            <line x1="3" y1="6" x2="21" y2="6" />
                            <line x1="3" y1="18" x2="21" y2="18" />
                        </svg>
                    </button>
                    <h2 th:text="${pageTitle ?: 'Admin Panel'}">Admin Panel</h2>
                </div>
                <div class="topbar-right">
                    <div class="topbar-search">
                        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                        <input type="text" placeholder="Tìm kiếm...">
                    </div>
                    <button class="topbar-icon-btn" title="Thông báo">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                            <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                        </svg>
                        <span class="notif-dot"></span>
                    </button>
                    <div class="topbar-user">
                        <div class="topbar-user-info">
                            <div class="topbar-user-name"
                                th:text="${currentUser != null ? currentUser.username : 'Admin'}">Admin</div>
                            <div class="topbar-user-role">Administrator</div>
                        </div>
                        <div class="topbar-avatar"
                            th:text="${currentUser != null ? currentUser.username.substring(0,1).toUpperCase() : 'A'}">A
                        </div>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div layout:fragment="content"></div>
        </div>
    </div>

    <script th:src="@{/js/common.js}"></script>
    <script th:src="@{/js/admin.js}"></script>
    <th:block layout:fragment="scripts"></th:block>
</body>

</html>
